<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧗 구술시험 주관식 연습</title>
  <script src="questions_practice.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

    :root {
      --purple: #534AB7;
      --purple-light: #EEEDFE;
      --purple-dark: #2D2870;
      --teal: #1D9E75;
      --teal-light: #E1F5EE;
      --amber: #BA7517;
      --amber-light: #FAEEDA;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --bg: #F8F7FF;
      --surface: #fff;
      --text: #1a1a2e;
      --text-sub: #6b6b8a;
      --border: #e8e6f0;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh
    }

    /* --- 로그인 --- */
    #login-screen {
      position: fixed; inset: 0; z-index: 10000;
      background: linear-gradient(135deg, #2D2870, #534AB7 55%, #7F77DD);
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .login-box {
      background: #fff; border-radius: 20px; padding: 2.25rem 1.75rem;
      width: 100%; max-width: 360px; text-align: center;
      box-shadow: 0 12px 50px rgba(0, 0, 0, .3);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .login-box h2 { font-size: 19px; font-weight: 800; color: #1a1a2e; margin: .5rem 0 .25rem; }
    .login-box p { font-size: 13px; color: #6b6b8a; margin-bottom: 1.5rem; line-height: 1.5; }
    .login-label { font-size: 12px; font-weight: 600; color: #6b6b8a; display: block; margin-bottom: 6px; text-align: left; }
    .login-input {
      width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid #e8e6f0;
      font-size: 15px; font-family: inherit; outline: none; margin-bottom: 14px; box-sizing: border-box;
      transition: all 0.2s;
    }
    .login-input:focus { border-color: #534AB7; box-shadow: 0 0 0 4px rgba(83, 74, 183, 0.1); }
    #login-err { font-size: 12px; color: #A32D2D; min-height: 18px; margin-bottom: 12px; text-align: left; display: block; font-weight: 500; }
    #login-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #534AB7, #7F77DD);
      color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all 0.3s;
    }
    #login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(83, 74, 183, 0.3); }
    .login-note { font-size: 11px; color: #a0a0b8; margin-top: 1.25rem; }

    .hero {
      background: linear-gradient(135deg, var(--purple-dark), var(--purple) 60%, #7F77DD);
      padding: 1.75rem 1.25rem;
      color: #fff;
      position: relative;
      overflow: hidden
    }

    .hero::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .05)
    }

    .hero h1 {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .hero p {
      font-size: 12px;
      opacity: .75
    }

    .tab-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(83, 74, 183, .06)
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 1rem
    }

    .tabs::-webkit-scrollbar {
      display: none
    }

    .tab {
      padding: .75rem 1rem;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .2s
    }

    .tab.active {
      color: var(--purple);
      border-bottom-color: var(--purple)
    }

    .content {
      padding: 1rem;
      max-width: 680px;
      margin: 0 auto;
      padding-bottom: 5rem
    }

    .section {
      display: none
    }

    .section.visible {
      display: block
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(83, 74, 183, .06)
    }

    .q-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(83, 74, 183, .06);
      transition: border-color .2s
    }

    .q-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px
    }

    .q-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--purple);
      background: var(--purple-light);
      padding: 2px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      margin-top: 2px
    }

    .q-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.6;
      flex: 1
    }

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      flex-shrink: 0
    }

    .b-c {
      background: var(--purple-light);
      color: #3C3489
    }

    .b-h {
      background: var(--teal-light);
      color: #085041
    }

    .b-r {
      background: var(--amber-light);
      color: #633806
    }

    .b-s {
      background: var(--red-light);
      color: #791F1F
    }

    .b-n {
      background: #E6F1FB;
      color: #0C447C
    }

    .b-g {
      background: #EAF3DE;
      color: #27500A
    }

    textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border .2s;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6
    }

    textarea:focus {
      border-color: var(--purple);
      background: var(--surface)
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s
    }

    .btn-p {
      background: var(--purple);
      color: #fff
    }

    .btn-p:hover {
      opacity: .88
    }

    .btn-g {
      background: var(--purple-light);
      color: var(--purple);
      border: 1px solid #AFA9EC
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap
    }

    /* 채점 결과 */
    .result-box {
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border)
    }

    .result-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .result-body {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.8
    }

    .score-5 {
      background: #E1F5EE;
      border-bottom: 1px solid #9FE1CB
    }

    .score-4 {
      background: #EAF3DE;
      border-bottom: 1px solid #C0DD97
    }

    .score-3 {
      background: var(--amber-light);
      border-bottom: 1px solid #FAC775
    }

    .score-2 {
      background: var(--red-light);
      border-bottom: 1px solid #F7C1C1
    }

    .score-1 {
      background: var(--red-light);
      border-bottom: 1px solid #F7C1C1
    }

    .stars {
      font-size: 15px;
      letter-spacing: 1px
    }

    /* 키워드 태그 */
    .kw-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px
    }

    .kw {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500
    }

    .kw-hit {
      background: var(--teal-light);
      color: #085041;
      border: 1px solid #5DCAA5
    }

    .kw-miss {
      background: var(--red-light);
      color: #791F1F;
      border: 1px solid #F09595
    }

    /* 진행 바 */
    .prog-wrap {
      margin-bottom: 1rem
    }

    .prog-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 5px
    }

    .prog-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), #7F77DD);
      border-radius: 3px;
      transition: width .4s
    }

    /* 필터 */
    .filter-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: 1rem
    }

    .filter-scroll::-webkit-scrollbar {
      display: none
    }

    .fbtn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer;
      background: var(--surface);
      color: var(--text-sub);
      white-space: nowrap;
      font-family: inherit;
      transition: all .15s;
      flex-shrink: 0
    }

    .fbtn.on {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple);
      font-weight: 500
    }

    /* 결과 */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1rem
    }

    .stat {
      background: var(--bg);
      border-radius: 10px;
      padding: .75rem;
      text-align: center;
      border: 1px solid var(--border)
    }

    .stat-n {
      font-size: 22px;
      font-weight: 700
    }

    .stat-l {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 2px
    }

    .tip {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 5px
    }

    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-sub);
      font-size: 14px
    }

    select {
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: inherit
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem
    }

    .mode-card {
      padding: 1rem;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      cursor: pointer;
      text-align: center;
      transition: all .15s;
      background: var(--surface)
    }

    .mode-card.on {
      border-color: var(--purple);
      background: var(--purple-light)
    }

    .mode-icon {
      font-size: 26px;
      margin-bottom: 4px
    }

    .mode-title {
      font-size: 13px;
      font-weight: 600
    }

    .mode-desc {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 2px
    }
  </style>
</head>

<body>

  <!-- ░░ LOGIN SCREEN ░░ -->
  <div id="main-content" style="display:block">

  <!-- 로그인 -->
  <div id="login-screen">
    <div class="login-box">
      <div style="font-size:48px">✏️</div>
      <h2>구술시험 주관식 연습</h2>
      <p>인증된 수강생만 이용할 수 있습니다<br>개인별 학습 진도가 자동으로 저장됩니다.</p>
      
      <label class="login-label">이름</label>
      <input id="inp-name" class="login-input" type="text" placeholder="이름을 입력하세요">
      
      <label class="login-label">비밀번호 (개인코드)</label>
      <input id="inp-pw" class="login-input" type="password" placeholder="비밀번호를 입력하세요">
      
      <span id="login-err"></span>
      <button id="login-btn" onclick="doLogin()">학습 시작하기</button>
      
      <p class="login-note">비밀번호를 모르시면 담당 강사에게 문의하세요</p>
    </div>
  </div>

    <div class="hero">
      <h1>✏️ 구술시험 주관식 연습</h1>
      <p>답변을 입력하면 핵심 키워드 포함 여부로 즉시 채점됩니다 · 완전 무료</p>
    </div>

    <div class="tab-wrap">
      <div class="tabs">
        <div class="tab active" onclick="showTab('practice',this)">✏️ 주관식 연습</div>
        <div class="tab" onclick="showTab('exam',this)">📝 모의고사</div>
        <div class="tab" onclick="showTab('result',this)">📊 나의 결과</div>
      </div>
    </div>

    <div class="content">

      <!-- 주관식 연습 -->
      <div id="practice" class="section visible">
        <div class="filter-scroll">
          <div class="fbtn on" onclick="filterQ(this,'all')">전체</div>
          <div class="fbtn" onclick="filterQ(this,'climbing')">🧗 클라이밍</div>
          <div class="fbtn" onclick="filterQ(this,'rule')">📋 경기규정</div>
          <div class="fbtn" onclick="filterQ(this,'safety')">⛑️ 안전</div>
          <div class="fbtn" onclick="filterQ(this,'hiking')">🏔️ 등산</div>
          <div class="fbtn" onclick="filterQ(this,'nutrition')">🥗 영양</div>
          <div class="fbtn" onclick="filterQ(this,'gear')">🔧 장비</div>
        </div>
        <div id="qcount" style="font-size:12px;color:var(--text-sub);margin-bottom:.75rem"></div>
        <div id="practice-list"></div>
      </div>

      <!-- 모의고사 -->
      <div id="exam" class="section">
        <div class="card">
          <div style="font-size:14px;font-weight:600;margin-bottom:1rem">⚙️ 모의고사 설정</div>
          <div class="mode-grid">
            <div class="mode-card on" onclick="setMode(this,'random')" id="mode-random">
              <div class="mode-icon">🎲</div>
              <div class="mode-title">랜덤 출제</div>
              <div class="mode-desc">전체에서 랜덤</div>
            </div>
            <div class="mode-card" onclick="setMode(this,'weak')" id="mode-weak">
              <div class="mode-icon">💪</div>
              <div class="mode-title">취약 문제</div>
              <div class="mode-desc">낮은 점수 위주</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <span style="font-size:13px;color:var(--text-sub)">문제 수</span>
            <select id="exam-count">
              <option value="5">5문제</option>
              <option value="10" selected>10문제</option>
              <option value="15">15문제</option>
              <option value="20">20문제</option>
            </select>
          </div>
          <button class="btn btn-p" style="width:100%" onclick="startExam()">모의고사 시작 ▶</button>
        </div>
        <div id="exam-content"></div> 
      </div>

      <!-- 나의 결과 -->
      <div id="result" class="section">
        <div id="result-content">
          <div class="empty">모의고사를 완료하면 결과가 표시됩니다</div>
        </div>
      </div>

    </div>

    <script>
      const CAT = { climbing: '클라이밍', rule: '경기규정', safety: '안전·사고', hiking: '등산', nutrition: '영양', gear: '장비' };
      const BADGE = { climbing: 'b-c', rule: 'b-r', safety: 'b-s', hiking: 'b-h', nutrition: 'b-n', gear: 'b-g' };

      const scores = {};      
      let examData = [];
      let examIdx = 0;
      let examResults = [];
      let examMode = 'random';
      let currentCat = 'all';
      const QA_ORIG = [...QA];

      // Firebase 설정
      // 수강생 코드 (암호: 이름)
      const STUDENT_CODES = {
        'kim-4493': '김진호',
        'oh-4946': '오혜진',
        'yun-7007': '윤재원',
        'jang-6656': '장미정',
        'jang-6224': '장윤희',
        'jang-7888': '장은정',
        'jo-8925': '조남석',
        'jin-5569': '진광주',
        'hong-2269': '홍승우',
        'hong-2324': '홍정희',
      };

      const FB_URL = 'https://sports-quiz-60fae-default-rtdb.firebaseio.com';
      let currentStudent = null;
      let studentProgress = {};

      function catBadge(cat) {
        return `<span class="badge ${BADGE[cat] || 'b-c'}">${CAT[cat] || cat}</span>`;
      }

      function gradeByKeyword(answer, kw) {
        const ans = answer.toLowerCase();
        const req = kw.required || [];
        const opt = kw.optional || [];

        const hitReq = req.filter(k => ans.includes(k.toLowerCase()));
        const hitOpt = opt.filter(k => ans.includes(k.toLowerCase()));
        const missReq = req.filter(k => !ans.includes(k.toLowerCase()));
        const missOpt = opt.filter(k => !ans.includes(k.toLowerCase()));

        const reqScore = req.length > 0 ? hitReq.length / req.length : 1;
        const optScore = opt.length > 0 ? hitOpt.length / opt.length : 0;
        const rawScore = reqScore * 0.7 + optScore * 0.3;

        let score;
        if (rawScore >= 0.9) score = 5;
        else if (rawScore >= 0.7) score = 4;
        else if (rawScore >= 0.5) score = 3;
        else if (rawScore >= 0.3) score = 2;
        else score = 1;

        const stars = '⭐'.repeat(score) + '☆'.repeat(5 - score);
        const msgs = {
          5: '완벽해요! 핵심 내용을 모두 포함했어요.',
          4: '잘 답변했어요! 대부분의 핵심을 포함했어요.',
          3: '기본 개념은 맞았지만 핵심 키워드가 일부 빠졌어요.',
          2: '핵심 키워드가 많이 빠졌어요. 다시 공부해보세요.',
          1: '핵심 내용이 포함되지 않았어요. 모범 답안을 확인하세요.',
        };

        return { score, stars, hitReq, missReq, hitOpt, missOpt, msg: msgs[score] };
      }

      function renderPractice(cat = 'all') {
        currentCat = cat;
        const list = cat === 'all' ? QA : QA.filter(q => q.cat === cat);
        document.getElementById('qcount').textContent = `총 ${list.length}문제`;
        document.getElementById('practice-list').innerHTML = list.map((item) => {
          const gi = QA_ORIG.indexOf(item); // 원본 인덱스 사용
          const sc = scores[gi];
          const scTag = sc ? `<span style="font-size:11px;font-weight:600;color:${sc >= 4 ? '#1D9E75' : sc >= 3 ? '#BA7517' : '#A32D2D'}">${'⭐'.repeat(sc)}${sc}/5</span>` : '';
          return `
    <div class="q-card">
      <div class="q-header">
        <span class="q-num">Q${list.indexOf(item) + 1}</span>
        <div class="q-text">${item.q}</div>
        ${catBadge(item.cat)}${scTag}
      </div>
      <textarea id="ta-${gi}" placeholder="핵심 키워드를 포함해서 자유롭게 답변하세요..." rows="3"></textarea>
      <p class="tip">💡 구술시험처럼 핵심 개념 위주로 답변해보세요</p>
      <div class="btn-row">
        <button class="btn btn-p btn-sm" onclick="grade(${gi})">✅ 채점하기</button>
        <button class="btn btn-g btn-sm" onclick="toggleAnswer(${gi})">📖 모범 답안</button>
      </div>
      <div id="fb-${gi}"></div>
      <div id="ans-${gi}" style="display:none;margin-top:8px;padding:10px 12px;background:var(--purple-light);border-radius:8px;font-size:13px;line-height:1.7;color:#3C3489">${item.a}</div>
    </div>`;
        }).join('');
      }

      function filterQ(btn, cat) {
        document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        renderPractice(cat);
      }

      function grade(gi) {
        const ans = document.getElementById(`ta-${gi}`).value.trim();
        if (!ans) { alert('답변을 먼저 입력해주세요!'); return; }

        const item = QA_ORIG[gi];
        const r = gradeByKeyword(ans, item.kw);
        scores[gi] = Math.max(scores[gi] || 0, r.score);
        saveProgress(gi, r.score);

        const scoreClass = `score-${r.score}`;
        document.getElementById(`fb-${gi}`).innerHTML = `
    <div class="result-box">
      <div class="result-header ${scoreClass}">
        <span class="stars">${r.stars}</span>
        <span style="font-size:13px;font-weight:700">${r.score}/5점</span>
        <span style="margin-left:6px;font-size:12px">${r.msg}</span>
      </div>
      <div class="result-body">
        <div style="margin-bottom:8px">
          <span style="font-size:12px;font-weight:600;color:var(--text-sub)">필수 키워드</span>
          <div class="kw-list">
            ${item.kw.required.map(k => `<span class="kw ${r.hitReq.includes(k) ? 'kw-hit' : 'kw-miss'}">${r.hitReq.includes(k) ? '✓' : '✗'} ${k}</span>`).join('')}
          </div>
        </div>
        ${item.kw.optional.length > 0 ? `
        <div>
          <span style="font-size:12px;font-weight:600;color:var(--text-sub)">추가 키워드</span>
          <div class="kw-list">
            ${item.kw.optional.map(k => `<span class="kw ${r.hitOpt.includes(k) ? 'kw-hit' : 'kw-miss'}">${r.hitOpt.includes(k) ? '✓' : '✗'} ${k}</span>`).join('')}
          </div>
        </div>`: ''}
        ${r.missReq.length > 0 ? `<div style="margin-top:8px;padding:8px 10px;background:var(--red-light);border-radius:8px;font-size:12px;color:#791F1F">❌ 빠진 핵심 키워드: <b>${r.missReq.join(', ')}</b></div>` : ''}
      </div>
    </div>`;
      }

      function toggleAnswer(gi) {
        const el = document.getElementById(`ans-${gi}`);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
      }

      function setMode(el, mode) {
        document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('on'));
        el.classList.add('on');
        examMode = mode;
      }

      function startExam() {
        const count = parseInt(document.getElementById('exam-count').value);
        let pool = [...QA];
        if (examMode === 'weak') {
          pool.sort((a, b) => (scores[QA_ORIG.indexOf(a)] || 0) - (scores[QA_ORIG.indexOf(b)] || 0));
        } else {
          pool = pool.sort(() => Math.random() - .5);
        }
        examData = pool.slice(0, count);
        examIdx = 0; examResults = [];
        renderExamQ();
      }

      function renderExamQ() {
        const el = document.getElementById('exam-content');
        if (examIdx >= examData.length) { showExamResult(); return; }
        const item = examData[examIdx];
        const pct = Math.round(examIdx / examData.length * 100);
        el.innerHTML = `
    <div class="prog-wrap">
      <div class="prog-info"><span>${examIdx + 1} / ${examData.length} 문제</span>${catBadge(item.cat)}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-header">
        <span class="q-num">Q${examIdx + 1}</span>
        <div class="q-text">${item.q}</div>
      </div>
      <textarea id="exam-ta" placeholder="답변을 입력하세요..." rows="4"></textarea>
      <p class="tip">💡 핵심 키워드를 포함해서 답변하세요</p>
      <div id="exam-fb"></div>
      <div class="btn-row" id="exam-btns">
        <button class="btn btn-p" onclick="gradeExam()">✅ 채점 후 다음</button>
        <button class="btn btn-g" onclick="skipExam()">건너뛰기 →</button>
      </div>
    </div>`;
      }

      function gradeExam() {
        const ans = document.getElementById('exam-ta').value.trim();
        if (!ans) { alert('답변을 입력해주세요!'); return; }
        const item = examData[examIdx];
        const r = gradeByKeyword(ans, item.kw);
        const gi = QA_ORIG.indexOf(item);
        scores[gi] = Math.max(scores[gi] || 0, r.score);
        saveProgress(gi, r.score);
        examResults.push({ item, ans, ...r });

        const scoreClass = `score-${r.score}`;
        document.getElementById('exam-fb').innerHTML = `
    <div class="result-box">
      <div class="result-header ${scoreClass}">
        <span class="stars">${r.stars}</span>
        <span style="font-size:13px;font-weight:700">${r.score}/5점</span>
        <span style="margin-left:6px;font-size:12px">${r.msg}</span>
      </div>
      <div class="result-body">
        <div class="kw-list">
          ${item.kw.required.map(k => `<span class="kw ${r.hitReq.includes(k) ? 'kw-hit' : 'kw-miss'}">${r.hitReq.includes(k) ? '✓' : '✗'} ${k}</span>`).join('')}
        </div>
        ${r.missReq.length > 0 ? `<div style="margin-top:6px;padding:7px 10px;background:var(--red-light);border-radius:8px;font-size:12px;color:#791F1F">❌ 빠진 키워드: <b>${r.missReq.join(', ')}</b></div>` : ''}
      </div>
    </div>`;
        document.getElementById('exam-btns').innerHTML = `<button class="btn btn-p" onclick="nextExam()">다음 문제 →</button>`;
      }

      function skipExam() {
        examResults.push({ item: examData[examIdx], ans: '(건너뜀)', score: 0, stars: '', msg: '건너뜀', hitReq: [], missReq: [], hitOpt: [], missOpt: [] });
        nextExam();
      }
      function nextExam() { examIdx++; renderExamQ(); }

      function showExamResult() {
        document.getElementById('exam-content').innerHTML = '';
        const valid = examResults.filter(r => r.score > 0);
        const avg = valid.length > 0 ? (valid.reduce((s, r) => s + r.score, 0) / examResults.length).toFixed(1) : 0;
        const high = valid.filter(r => r.score >= 4).length;
        const mid = valid.filter(r => r.score === 3).length;
        const low = valid.filter(r => r.score <= 2).length;

        const rc = document.getElementById('result-content');
        rc.innerHTML = `
    <div class="card" style="text-align:center;padding:1.5rem">
      <div style="font-size:44px;font-weight:700;color:var(--purple)">${avg}<span style="font-size:18px;color:var(--text-sub)">/5</span></div>
      <div style="font-size:13px;color:var(--text-sub);margin-bottom:1rem">평균 점수 · ${examResults.length}문제 완료</div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-n" style="color:var(--teal)">${high}</div><div class="stat-l">우수(4~5점)</div></div>
        <div class="stat"><div class="stat-n">${mid}</div><div class="stat-l">보통(3점)</div></div>
        <div class="stat"><div class="stat-n" style="color:var(--red)">${low}</div><div class="stat-l">보완필요</div></div>
      </div>
    </div>
    ${examResults.map((r, i) => `
      <div class="q-card">
        <div class="q-header">
          <span class="q-num">Q${i + 1}</span>
          <div class="q-text">${r.item.q}</div>
          ${r.score > 0 ? `<span style="font-size:12px;font-weight:600;color:${r.score >= 4 ? '#1D9E75' : r.score >= 3 ? '#BA7517' : '#A32D2D'}">${r.stars} ${r.score}/5</span>` : '<span style="font-size:11px;color:var(--text-sub)">건너뜀</span>'}
        </div>
        ${r.score > 0 ? `
          <div style="font-size:12px;color:var(--text-sub);margin-bottom:6px">내 답변: <span style="color:var(--text)">${r.ans.length > 80 ? r.ans.slice(0, 78) + '...' : r.ans}</span></div>
          <div class="kw-list">
            ${r.item.kw.required.map(k => `<span class="kw ${r.hitReq.includes(k) ? 'kw-hit' : 'kw-miss'}">${r.hitReq.includes(k) ? '✓' : '✗'} ${k}</span>`).join('')}
          </div>`: ''}
        <div style="margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--text-sub)">
          📖 ${r.item.a}
        </div>
      </div>`).join('')}
    <button class="btn btn-p" style="width:100%;margin-top:1rem" onclick="startExam()">🔄 다시 도전</button>`;

        showTab('result', document.querySelector('.tab:nth-child(3)'));
      }

      function showTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('visible');
        if (el) el.classList.add('active');
      }

      // --- Firebase & 세션 관리 로직 (최종판 방식) ---
      let curToken = null;

      function doLogin() {
        const name = document.getElementById('inp-name').value.trim();
        const pw = document.getElementById('inp-pw').value.trim();
        const err = document.getElementById('login-err');
        const btn = document.getElementById('login-btn');

        if (!name) { err.textContent = '이름을 입력해 주세요.'; return; }
        if (!pw) { err.textContent = '비밀번호를 입력해 주세요.'; return; }
        if (!STUDENT_CODES[pw]) { err.textContent = '⚠️ 비밀번호가 올바르지 않습니다.'; document.getElementById('inp-pw').value = ''; return; }
        if (STUDENT_CODES[pw] !== name) { err.textContent = '⚠️ 이름이 코드와 일치하지 않습니다.'; return; }

        btn.textContent = '확인 중...';
        btn.disabled = true;
        err.textContent = '';

        const now = new Date();
        const time = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
        const device = /iPad|iPhone|iPod/.test(navigator.userAgent) ? 'iPhone' : /Android/.test(navigator.userAgent) ? 'Android' : 'PC';
        const sk = pw.replace(/-/g, '_');
        const token = Math.random().toString(36).slice(2) + Date.now().toString(36);

        // 중복 접속 확인 및 세션 생성
        fetch(FB_URL + '/sessions/' + sk + '.json')
          .then(r => r.json())
          .then(ex => {
            if (ex && ex.token) {
              const elapsed = Date.now() - (ex.lastBeat || 0);
              if (elapsed < 30 * 1000) { // 30초 이내 활동 중이면 차단
                err.textContent = '⚠️ 이미 다른 기기(' + ex.device + ')에서 접속 중입니다.';
                btn.textContent = '학습 시작하기'; btn.disabled = false;
                return Promise.reject('block');
              }
            }
            return fetch(FB_URL + '/sessions/' + sk + '.json', { 
              method: 'PUT', 
              headers: { 'Content-Type': 'application/json' }, 
              body: JSON.stringify({ name, token, time, device, lastBeat: Date.now() }) 
            });
          })
          .catch(e => {
            if (e === 'block') throw e;
            console.warn('Session check/creation failed:', e);
            return null;
          })
          .then(() => {
            fetch(FB_URL + '/logs.json', { 
              method: 'POST', 
              headers: { 'Content-Type': 'application/json' }, 
              body: JSON.stringify({ name, time, device, type: 'practice' }) 
            }).catch(() => { });

            currentStudent = pw;
            curToken = token;

            setInterval(() => {
              fetch(FB_URL + '/sessions/' + sk + '.json').then(r => r.json()).then(cur => {
                if (!cur || cur.token !== curToken) { 
                  alert('⚠️ 다른 기기에서 접속하였거나 관리자에 의해 세션이 종료되었습니다.'); 
                  location.reload(); 
                }
                else fetch(FB_URL + '/sessions/' + sk + '/lastBeat.json', { 
                  method: 'PUT', 
                  headers: { 'Content-Type': 'application/json' }, 
                  body: Date.now().toString() 
                }).catch(() => { });
              }).catch(() => { });
            }, 30000);

            window.addEventListener('beforeunload', () => navigator.sendBeacon(FB_URL + '/sessions/' + sk + '.json', JSON.stringify(null)));

            return loadProgress(pw);
          })
          .then(() => enterApp())
          .catch(e => {
            if (e === 'block') return;
            currentStudent = pw;
            enterApp();
          });
      }

      function enterApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        
        // 점수 동기화
        for (let idx in studentProgress) {
          scores[idx] = studentProgress[idx].score;
        }
        
        QA.sort(() => Math.random() - 0.5);
        renderPractice('all');
      }

      function pad(n) { return String(n).padStart(2, '0'); }

      async function loadProgress(pw) {
        const key = pw.replace(/-/g, '_');
        try {
          const res = await fetch(`${FB_URL}/progress/${key}.json`);
          const data = await res.json();
          studentProgress = data || {};
        } catch (e) { studentProgress = {}; }
      }

      function saveProgress(qIdx, score) {
        if (!currentStudent) return;
        const key = currentStudent.replace(/-/g, '_');
        const prev = studentProgress[qIdx] || { score: 0, tries: 0 };
        studentProgress[qIdx] = {
          score: Math.max(prev.score, score),
          tries: (prev.tries || 0) + 1,
          lastSeen: Date.now()
        };
        fetch(`${FB_URL}/progress/${key}/${qIdx}.json`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(studentProgress[qIdx])
        }).catch(() => { });
      }

      // 초기화
      window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('inp-name').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') document.getElementById('inp-pw').focus();
        });
        document.getElementById('inp-pw').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') doLogin();
        });
      });
    </script>
</body>
</html>
