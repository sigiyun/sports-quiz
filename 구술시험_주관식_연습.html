<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧗 구술시험 주관식 연습</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  :root{
    --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#2D2870;
    --teal:#1D9E75;--teal-light:#E1F5EE;
    --amber:#BA7517;--amber-light:#FAEEDA;
    --red:#A32D2D;--red-light:#FCEBEB;
    --bg:#F8F7FF;--surface:#fff;--text:#1a1a2e;--text-sub:#6b6b8a;--border:#e8e6f0;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .hero{background:linear-gradient(135deg,var(--purple-dark),var(--purple) 60%,#7F77DD);padding:1.75rem 1.25rem;color:#fff;position:relative;overflow:hidden}
  .hero::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05)}
  .hero h1{font-size:19px;font-weight:700;margin-bottom:4px}
  .hero p{font-size:12px;opacity:.75}
  .tab-wrap{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(83,74,183,.06)}
  .tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 1rem}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:.75rem 1rem;font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .2s}
  .tab.active{color:var(--purple);border-bottom-color:var(--purple)}
  .content{padding:1rem;max-width:680px;margin:0 auto;padding-bottom:5rem}
  .section{display:none}.section.visible{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:12px;box-shadow:0 2px 8px rgba(83,74,183,.06)}
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:12px;box-shadow:0 2px 8px rgba(83,74,183,.06);transition:border-color .2s}
  .q-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
  .q-num{font-size:11px;font-weight:700;color:var(--purple);background:var(--purple-light);padding:2px 8px;border-radius:6px;flex-shrink:0;margin-top:2px}
  .q-text{font-size:14px;font-weight:500;color:var(--text);line-height:1.6;flex:1}
  .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;flex-shrink:0}
  .b-c{background:var(--purple-light);color:#3C3489}.b-h{background:var(--teal-light);color:#085041}
  .b-r{background:var(--amber-light);color:#633806}.b-s{background:var(--red-light);color:#791F1F}
  .b-n{background:#E6F1FB;color:#0C447C}.b-g{background:#EAF3DE;color:#27500A}
  textarea{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:80px;outline:none;transition:border .2s;color:var(--text);background:var(--bg);line-height:1.6}
  textarea:focus{border-color:var(--purple);background:var(--surface)}
  .btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-p{background:var(--purple);color:#fff}.btn-p:hover{opacity:.88}
  .btn-g{background:var(--purple-light);color:var(--purple);border:1px solid #AFA9EC}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  /* 채점 결과 */
  .result-box{margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  .result-header{padding:10px 14px;display:flex;align-items:center;gap:8px}
  .result-body{padding:12px 14px;font-size:13px;line-height:1.8}
  .score-5{background:#E1F5EE;border-bottom:1px solid #9FE1CB}
  .score-4{background:#EAF3DE;border-bottom:1px solid #C0DD97}
  .score-3{background:var(--amber-light);border-bottom:1px solid #FAC775}
  .score-2{background:var(--red-light);border-bottom:1px solid #F7C1C1}
  .score-1{background:var(--red-light);border-bottom:1px solid #F7C1C1}
  .stars{font-size:15px;letter-spacing:1px}
  /* 키워드 태그 */
  .kw-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .kw{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
  .kw-hit{background:var(--teal-light);color:#085041;border:1px solid #5DCAA5}
  .kw-miss{background:var(--red-light);color:#791F1F;border:1px solid #F09595}
  /* 진행 바 */
  .prog-wrap{margin-bottom:1rem}
  .prog-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text-sub);margin-bottom:5px}
  .prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),#7F77DD);border-radius:3px;transition:width .4s}
  /* 필터 */
  .filter-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:1rem}
  .filter-scroll::-webkit-scrollbar{display:none}
  .fbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--surface);color:var(--text-sub);white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
  .fbtn.on{background:var(--purple);color:#fff;border-color:var(--purple);font-weight:500}
  /* 결과 */
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
  .stat{background:var(--bg);border-radius:10px;padding:.75rem;text-align:center;border:1px solid var(--border)}
  .stat-n{font-size:22px;font-weight:700}.stat-l{font-size:11px;color:var(--text-sub);margin-top:2px}
  .tip{font-size:11px;color:var(--text-sub);margin-top:5px}
  .empty{text-align:center;padding:2rem;color:var(--text-sub);font-size:14px}
  select{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit}
  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
  .mode-card{padding:1rem;border-radius:var(--radius);border:1.5px solid var(--border);cursor:pointer;text-align:center;transition:all .15s;background:var(--surface)}
  .mode-card.on{border-color:var(--purple);background:var(--purple-light)}
  .mode-icon{font-size:26px;margin-bottom:4px}
  .mode-title{font-size:13px;font-weight:600}
  .mode-desc{font-size:11px;color:var(--text-sub);margin-top:2px}
</style>
</head>
<body>

<div class="hero">
  <h1>✏️ 구술시험 주관식 연습</h1>
  <p>답변을 입력하면 핵심 키워드 포함 여부로 즉시 채점됩니다 · 완전 무료 · 94문제</p>
</div>

<div class="tab-wrap">
  <div class="tabs">
    <div class="tab active" onclick="showTab('practice',this)">✏️ 주관식 연습</div>
    <div class="tab" onclick="showTab('exam',this)">📝 모의고사</div>
    <div class="tab" onclick="showTab('result',this)">📊 나의 결과</div>
  </div>
</div>

<div class="content">

  <!-- 주관식 연습 -->
  <div id="practice" class="section visible">
    <div class="filter-scroll">
      <div class="fbtn on" onclick="filterQ(this,'all')">전체</div>
      <div class="fbtn" onclick="filterQ(this,'climbing')">🧗 클라이밍</div>
      <div class="fbtn" onclick="filterQ(this,'rule')">📋 경기규정</div>
      <div class="fbtn" onclick="filterQ(this,'safety')">⛑️ 안전</div>
      <div class="fbtn" onclick="filterQ(this,'hiking')">🏔️ 등산</div>
      <div class="fbtn" onclick="filterQ(this,'nutrition')">🥗 영양</div>
      <div class="fbtn" onclick="filterQ(this,'gear')">🔧 장비</div>
    </div>
    <div id="qcount" style="font-size:12px;color:var(--text-sub);margin-bottom:.75rem"></div>
    <div id="practice-list"></div>
  </div>

  <!-- 모의고사 -->
  <div id="exam" class="section">
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:1rem">⚙️ 모의고사 설정</div>
      <div class="mode-grid">
        <div class="mode-card on" onclick="setMode(this,'random')" id="mode-random">
          <div class="mode-icon">🎲</div>
          <div class="mode-title">랜덤 출제</div>
          <div class="mode-desc">전체에서 랜덤</div>
        </div>
        <div class="mode-card" onclick="setMode(this,'weak')" id="mode-weak">
          <div class="mode-icon">💪</div>
          <div class="mode-title">취약 문제</div>
          <div class="mode-desc">낮은 점수 위주</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="font-size:13px;color:var(--text-sub)">문제 수</span>
        <select id="exam-count">
          <option value="5">5문제</option>
          <option value="10" selected>10문제</option>
          <option value="15">15문제</option>
          <option value="20">20문제</option>
        </select>
      </div>
      <button class="btn btn-p" style="width:100%" onclick="startExam()">모의고사 시작 ▶</button>
    </div>
    <div id="exam-content"></div>
  </div>

  <!-- 나의 결과 -->
  <div id="result" class="section">
    <div id="result-content"><div class="empty">모의고사를 완료하면 결과가 표시됩니다</div></div>
  </div>

</div>

<script>
const CAT={climbing:'클라이밍',rule:'경기규정',safety:'안전·사고',hiking:'등산',nutrition:'영양',gear:'장비'};
const BADGE={climbing:'b-c',rule:'b-r',safety:'b-s',hiking:'b-h',nutrition:'b-n',gear:'b-g'};

// 문제 데이터 — 키워드: 필수(required) + 선택(optional)
const QA=[
  {cat:'climbing',q:'레스트스텝(Rest Step)의 정의와 효과를 설명하시오',
   kw:{required:['무릎','펴','뼈','체중'],optional:['근육','피로','고지대','세컨드']},
   a:'한 발을 내딛은 후 무릎을 완전히 펴고 뼈로 체중을 지지하며 순간 멈추는 보행 기술. 근육을 짧게 쉬게 해 피로 누적을 방지한다.'},
  {cat:'climbing',q:'볼더링 성공(완등) 판정 기준을 설명하시오',
   kw:{required:['두 손','TOP 홀드','안정'],optional:['완등','통제','꼭대기']},
   a:'TOP 홀드를 두 손으로 잡고 안정적으로 통제한 자세를 취하거나, 볼더 꼭대기에 선 자세를 취하면 완등으로 인정된다.'},
  {cat:'climbing',q:'자유등반과 인공등반의 차이를 설명하시오',
   kw:{required:['장비','추락 방지','신체'],optional:['손잡이','발판','이동']},
   a:'자유등반은 장비를 추락 방지 용도로만 사용하고 신체의 힘과 기술만으로 등반한다. 인공등반은 장비를 손잡이나 발판으로 활용하여 이동한다.'},
  {cat:'climbing',q:'클라이밍 지도법 4단계를 설명하시오',
   kw:{required:['설명','시범','실시','교정'],optional:['피드백','반복','지도자','학습자']},
   a:'1단계 설명, 2단계 시범, 3단계 실시, 4단계 교정. 각 단계별로 동작을 설명하고 시연하며 학습자가 수행한 후 피드백을 준다.'},
  {cat:'climbing',q:'홀드의 통제(Control)와 사용(Use)의 차이를 설명하시오',
   kw:{required:['통제','사용','안정'],optional:['득점','이동','다음 홀드']},
   a:'통제는 홀드를 잡아 안정적 자세를 취하거나 동적 움직임을 성공적으로 제동한 상태로 득점 인정 기준이다. 사용은 홀드를 잡고 다음 홀드 방향으로 실제 이동하는 것이다.'},
  {cat:'climbing',q:'볼더링이 리드보다 부상이 많은 이유를 설명하시오',
   kw:{required:['로프','안전매트','추락'],optional:['근력','동적','관절','볼더링']},
   a:'볼더링은 로프 없이 안전매트에 직접 추락하기 때문에 부상이 많다. 반복적인 고강도 동작으로 근육·관절에 집중적인 스트레스가 가해진다.'},
  {cat:'climbing',q:'기저면(Base of Support)이란 무엇인지 설명하시오',
   kw:{required:['손','발','홀드','면적'],optional:['무게중심','안정','기저']},
   a:'등반자가 벽에 접촉하는 손·발 홀드들이 이루는 지지 면적. 기저면이 넓을수록 안정적이며 무게중심을 기저면 위에 유지해야 효율적이다.'},
  {cat:'rule',q:'FOP(Field of Play)란 무엇인지 설명하시오',
   kw:{required:['경기 구역','격리','대기'],optional:['출입','임원','심판','선수']},
   a:'경기가 진행되는 공식 경기 구역 전체. 격리구역, 대기구역, 이동구역, 준비운동지역이 포함된다. 출입 가능자는 KAF 임원, 조직위원회 임원, 출전 선수, 심판 등이다.'},
  {cat:'rule',q:'볼더링·리드·스피드 경기의 순위 결정 방법을 설명하시오',
   kw:{required:['완등','시도 횟수','높이','시간'],optional:['존','스피드','콤바인','곱']},
   a:'볼더링은 완등 수, 시도 횟수 순. 리드는 가장 높이 올라간 홀드 기준, 동점 시 시간. 스피드는 완등 소요 시간. 콤바인은 각 종목 순위의 곱.'},
  {cat:'rule',q:'불법적인 도움(Illegal Assistance)을 설명하시오',
   kw:{required:['T-너트','테이프','로프'],optional:['볼트','행거','정보','조언']},
   a:'T-너트를 손으로 사용하거나, 검정색 테이프 경계선 바깥 표면 사용, 고정 볼트 행거를 손발로 사용, 확보지점이나 로프를 손발로 사용, 외부로부터 정보나 조언을 받는 행위.'},
  {cat:'rule',q:'격리(Isolation) 상태와 격리구역을 설명하시오',
   kw:{required:['정보','격리구역','제한'],optional:['입장','선수','공유','라운드']},
   a:'격리 상태는 선수가 해당 라운드에 대해 제한적인 정보만으로 경기하게 하는 것이다. 격리구역은 출전 자격 있는 선수와 공인된 팀 임원만 입장 가능하다.'},
  {cat:'rule',q:'레드카드와 옐로우카드의 기준을 설명하시오',
   kw:{required:['옐로우','레드','실격'],optional:['비스포츠','장비','BMI','두 장']},
   a:'옐로우카드는 사소한 비스포츠 행동, 장비 규정 불이행 등. 레드카드는 비승인 장비 사용, 외부 정보 공유, BMI 거부, 동일 대회 옐로우 2장 시 부여되며 대회 전체 실격이다.'},
  {cat:'rule',q:'DNS(출발않음)의 의미를 설명하시오',
   kw:{required:['시도','격리구역','호명'],optional:['출발','라운드','볼더','기권']},
   a:'대회 라운드에서 특정 볼더 또는 루트를 선수가 시도하지 않은 것. 격리구역에 미입장하거나 대기구역에서 호명 시 응답이 없는 경우 해당된다.'},
  {cat:'safety',q:'일사병과 열사병의 차이와 응급처치를 설명하시오',
   kw:{required:['체온','의식','119'],optional:['발한','40도','체온조절','장기']},
   a:'일사병은 체온 37~40도, 의식 있음, 수분 보충으로 회복 가능. 열사병은 체온조절 마비, 40도 이상, 의식 혼미, 즉시 119 신고 필요. 열사병이 더 위험한 이유는 자연 회복 불가능하기 때문이다.'},
  {cat:'safety',q:'CPR(심폐소생술)의 순서를 설명하시오',
   kw:{required:['가슴 압박','119','기도'],optional:['인공호흡','30:2','100회','AED']},
   a:'반응 확인 후 119 신고, AED 요청. 가슴 압박(흉골 아래 1/2, 분당 100~120회, 5~6cm 깊이). 기도 열기. 인공호흡 2회. 30:2 비율로 반복.'},
  {cat:'safety',q:'저체온증의 원인, 증상, 예방법을 설명하시오',
   kw:{required:['35도','체온','오한'],optional:['젖은 옷','바람','의식','보온']},
   a:'체온 35도 이하 상태. 젖은 옷과 바람에 노출 시 열 손실 급증. 증상은 오한→판단력 저하→근육 경직→의식 혼미 순. 예방은 방풍 보온 의류, 고열량 음식 수시 섭취.'},
  {cat:'safety',q:'볼더링 안전 수칙을 설명하시오',
   kw:{required:['확인','추락','매트'],optional:['뛰어내리','엉덩이','간섭','착석']},

const scores = {};      // 문제별 최고 점수 저장

function catBadge(cat){
  return `<span class="badge ${BADGE[cat]||'b-c'}">${CAT[cat]||cat}</span>`;
}

// ── 키워드 매칭 채점 ──────────────────────────
function gradeByKeyword(answer, kw){
  const ans = answer.toLowerCase();
  const req = kw.required || [];
  const opt = kw.optional || [];

  const hitReq = req.filter(k => ans.includes(k.toLowerCase()));
  const hitOpt = opt.filter(k => ans.includes(k.toLowerCase()));
  const missReq = req.filter(k => !ans.includes(k.toLowerCase()));
  const missOpt = opt.filter(k => !ans.includes(k.toLowerCase()));

  const reqScore = req.length > 0 ? hitReq.length / req.length : 1;
  const optScore = opt.length > 0 ? hitOpt.length / opt.length : 0;
  const rawScore = reqScore * 0.7 + optScore * 0.3;

  let score;
  if(rawScore >= 0.9) score = 5;
  else if(rawScore >= 0.7) score = 4;
  else if(rawScore >= 0.5) score = 3;
  else if(rawScore >= 0.3) score = 2;
  else score = 1;

  const stars = '⭐'.repeat(score) + '☆'.repeat(5-score);
  const msgs = {
    5:'완벽해요! 핵심 내용을 모두 포함했어요.',
    4:'잘 답변했어요! 대부분의 핵심을 포함했어요.',
    3:'기본 개념은 맞았지만 핵심 키워드가 일부 빠졌어요.',
    2:'핵심 키워드가 많이 빠졌어요. 다시 공부해보세요.',
    1:'핵심 내용이 포함되지 않았어요. 모범 답안을 확인하세요.',
  };

  return { score, stars, hitReq, missReq, hitOpt, missOpt, msg: msgs[score] };
}

// ── 문제 렌더링 ──────────────────────────────
function renderPractice(cat='all'){
  currentCat = cat;
  const list = cat==='all' ? QA : QA.filter(q=>q.cat===cat);
  document.getElementById('qcount').textContent = `총 ${list.length}문제`;
  document.getElementById('practice-list').innerHTML = list.map((item)=>{
    const gi = QA.indexOf(item);
    const sc = scores[gi];
    const scTag = sc ? `<span style="font-size:11px;font-weight:600;color:${sc>=4?'#1D9E75':sc>=3?'#BA7517':'#A32D2D'}">${'⭐'.repeat(sc)}${sc}/5</span>` : '';
    return `
    <div class="q-card">
      <div class="q-header">
        <span class="q-num">Q${list.indexOf(item)+1}</span>
        <div class="q-text">${item.q}</div>
        ${catBadge(item.cat)}${scTag}
      </div>
      <textarea id="ta-${gi}" placeholder="핵심 키워드를 포함해서 자유롭게 답변하세요..." rows="3"></textarea>
      <p class="tip">💡 구술시험처럼 핵심 개념 위주로 답변해보세요</p>
      <div class="btn-row">
        <button class="btn btn-p btn-sm" onclick="grade(${gi})">✅ 채점하기</button>
        <button class="btn btn-g btn-sm" onclick="toggleAnswer(${gi})">📖 모범 답안</button>
      </div>
      <div id="fb-${gi}"></div>
      <div id="ans-${gi}" style="display:none;margin-top:8px;padding:10px 12px;background:var(--purple-light);border-radius:8px;font-size:13px;line-height:1.7;color:#3C3489">${item.a}</div>
    </div>`;
  }).join('');
}

function filterQ(btn, cat){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPractice(cat);
}

function grade(gi){
  const ans = document.getElementById(`ta-${gi}`).value.trim();
  if(!ans){ alert('답변을 먼저 입력해주세요!'); return; }

  const item = QA[gi];
  const r = gradeByKeyword(ans, item.kw);
  scores[gi] = Math.max(scores[gi]||0, r.score);

  const scoreClass = `score-${r.score}`;
  document.getElementById(`fb-${gi}`).innerHTML = `
    <div class="result-box">
      <div class="result-header ${scoreClass}">
        <span class="stars">${r.stars}</span>
        <span style="font-size:13px;font-weight:700">${r.score}/5점</span>
        <span style="margin-left:6px;font-size:12px">${r.msg}</span>
      </div>
      <div class="result-body">
        <div style="margin-bottom:8px">
          <span style="font-size:12px;font-weight:600;color:var(--text-sub)">필수 키워드</span>
          <div class="kw-list">
            ${item.kw.required.map(k=>`<span class="kw ${r.hitReq.includes(k)?'kw-hit':'kw-miss'}">${r.hitReq.includes(k)?'✓':'✗'} ${k}</span>`).join('')}
          </div>
        </div>
        ${item.kw.optional.length>0?`
        <div>
          <span style="font-size:12px;font-weight:600;color:var(--text-sub)">추가 키워드</span>
          <div class="kw-list">
            ${item.kw.optional.map(k=>`<span class="kw ${r.hitOpt.includes(k)?'kw-hit':'kw-miss'}">${r.hitOpt.includes(k)?'✓':'✗'} ${k}</span>`).join('')}
          </div>
        </div>`:''}
        ${r.missReq.length>0?`<div style="margin-top:8px;padding:8px 10px;background:var(--red-light);border-radius:8px;font-size:12px;color:#791F1F">❌ 빠진 핵심 키워드: <b>${r.missReq.join(', ')}</b></div>`:''}
      </div>
    </div>`;
}

function toggleAnswer(gi){
  const el = document.getElementById(`ans-${gi}`);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}

// ── 모의고사 ─────────────────────────────────
function setMode(el, mode){
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  examMode = mode;
}

function startExam(){
  const count = parseInt(document.getElementById('exam-count').value);
  let pool = [...QA];
  if(examMode==='weak'){
    pool.sort((a,b)=>{
      const sa = scores[QA.indexOf(a)]||0;
      const sb = scores[QA.indexOf(b)]||0;
      return sa-sb;
    });
  } else {
    pool = pool.sort(()=>Math.random()-.5);
  }
  examData = pool.slice(0,count);
  examIdx=0; examResults=[];
  renderExamQ();
}

    </div>
    <div class="q-card">
      <div class="q-header">
        <span class="q-num">Q${examIdx+1}</span>
        <div class="q-text">${item.q}</div>
      </div>
      <textarea id="exam-ta" placeholder="답변을 입력하세요..." rows="4"></textarea>
      <p class="tip">💡 핵심 키워드를 포함해서 답변하세요</p>
      <div id="exam-fb"></div>
      <div class="btn-row" id="exam-btns">
        <button class="btn btn-p" onclick="gradeExam()">✅ 채점 후 다음</button>
        <button class="btn btn-g" onclick="skipExam()">건너뛰기 →</button>
      </div>
    </div>`;
}

function gradeExam(){
  const ans = document.getElementById('exam-ta').value.trim();
  if(!ans){ alert('답변을 입력해주세요!'); return; }
  const item = examData[examIdx];
  const r = gradeByKeyword(ans, item.kw);
  scores[QA.indexOf(item)] = Math.max(scores[QA.indexOf(item)]||0, r.score);
  examResults.push({item, ans, ...r});

  const scoreClass = `score-${r.score}`;
  document.getElementById('exam-fb').innerHTML=`
    <div class="result-box">
      <div class="result-header ${scoreClass}">
        <span class="stars">${r.stars}</span>
        <span style="font-size:13px;font-weight:700">${r.score}/5점</span>
        <span style="margin-left:6px;font-size:12px">${r.msg}</span>
      </div>
      <div class="result-body">
        <div class="kw-list">
          ${item.kw.required.map(k=>`<span class="kw ${r.hitReq.includes(k)?'kw-hit':'kw-miss'}">${r.hitReq.includes(k)?'✓':'✗'} ${k}</span>`).join('')}
        </div>
        ${r.missReq.length>0?`<div style="margin-top:6px;padding:7px 10px;background:var(--red-light);border-radius:8px;font-size:12px;color:#791F1F">❌ 빠진 키워드: <b>${r.missReq.join(', ')}</b></div>`:''}
      </div>
    </div>`;
  document.getElementById('exam-btns').innerHTML=`<button class="btn btn-p" onclick="nextExam()">다음 문제 →</button>`;
}

function skipExam(){
  examResults.push({item:examData[examIdx],ans:'(건너뜀)',score:0,stars:'',msg:'건너뜀',hitReq:[],missReq:[],hitOpt:[],missOpt:[]});
  nextExam();
}
function nextExam(){ examIdx++; renderExamQ(); }

function showExamResult(){
  document.getElementById('exam-content').innerHTML='';
  const valid = examResults.filter(r=>r.score>0);
  const avg = valid.length>0 ? (valid.reduce((s,r)=>s+r.score,0)/examResults.length).toFixed(1) : 0;
  const high = valid.filter(r=>r.score>=4).length;
  const mid = valid.filter(r=>r.score===3).length;
  const low = valid.filter(r=>r.score<=2).length;

  const rc = document.getElementById('result-content');
  rc.innerHTML=`
    <div class="card" style="text-align:center;padding:1.5rem">
      <div style="font-size:44px;font-weight:700;color:var(--purple)">${avg}<span style="font-size:18px;color:var(--text-sub)">/5</span></div>
      <div style="font-size:13px;color:var(--text-sub);margin-bottom:1rem">평균 점수 · ${examResults.length}문제 완료</div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-n" style="color:var(--teal)">${high}</div><div class="stat-l">우수(4~5점)</div></div>
        <div class="stat"><div class="stat-n">${mid}</div><div class="stat-l">보통(3점)</div></div>
        <div class="stat"><div class="stat-n" style="color:var(--red)">${low}</div><div class="stat-l">보완필요</div></div>
      </div>
    </div>
    ${examResults.map((r,i)=>`
      <div class="q-card">
        <div class="q-header">
          <span class="q-num">Q${i+1}</span>
          <div class="q-text">${r.item.q}</div>
          ${r.score>0?`<span style="font-size:12px;font-weight:600;color:${r.score>=4?'#1D9E75':r.score>=3?'#BA7517':'#A32D2D'}">${r.stars} ${r.score}/5</span>`:'<span style="font-size:11px;color:var(--text-sub)">건너뜀</span>'}
        </div>
        ${r.score>0?`
          <div style="font-size:12px;color:var(--text-sub);margin-bottom:6px">내 답변: <span style="color:var(--text)">${r.ans.length>80?r.ans.slice(0,78)+'...':r.ans}</span></div>
          <div class="kw-list">
            ${r.item.kw.required.map(k=>`<span class="kw ${r.hitReq.includes(k)?'kw-hit':'kw-miss'}">${r.hitReq.includes(k)?'✓':'✗'} ${k}</span>`).join('')}
          </div>`:''}
        <div style="margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--text-sub)">
          📖 ${r.item.a}
        </div>
      </div>`).join('')}
    <button class="btn btn-p" style="width:100%;margin-top:1rem" onclick="startExam()">🔄 다시 도전</button>`;

  showTab('result', document.querySelector('.tab:nth-child(3)'));
}

function showTab(id, el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('visible');
  if(el) el.classList.add('active');
}

renderPractice('all');
</script>
</body>
</html>
